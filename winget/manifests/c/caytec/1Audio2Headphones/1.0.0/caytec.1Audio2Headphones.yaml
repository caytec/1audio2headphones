ShortDescription: Stream one audio source to two headphone outputs simultaneously
Description: |-
  1Audio2Headphones is a lightweight Windows application that streams one audio source
  to two headphone outputs simultaneously. Perfect for watching movies together,
  couch co-op gaming, or sharing music without speakers.

  Uses native Windows WASAPI Loopback - no virtual cables, no Voicemeeter, no drivers.
  Single .exe file, zero installation, zero configuration.
