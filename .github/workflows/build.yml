name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe
        run: python build.py

      - name: Verify artifact
        run: |
          if (-not (Test-Path "dist/1Audio2Headphones.exe")) {
            Write-Error "Build did not produce dist/1Audio2Headphones.exe"
            exit 1
          }
          Get-Item dist/1Audio2Headphones.exe | Format-List Name, Length

      - name: Upload artifact (for PRs / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: 1Audio2Headphones
          path: dist/1Audio2Headphones.exe
          retention-days: 30

      - name: Publish "latest" release (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Najnowsza wersja
          body: |
            Automatyczny build z najnowszego commitu na `main`.

            **Pobierz:** [`1Audio2Headphones.exe`](https://github.com/${{ github.repository }}/releases/latest/download/1Audio2Headphones.exe)

            Commit: ${{ github.sha }}
          files: dist/1Audio2Headphones.exe
          prerelease: false
          make_latest: "true"
